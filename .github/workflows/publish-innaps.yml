name: Publish InnaPs Module

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Module version to publish (e.g. 1.2.3)'
        required: true

permissions:
  packages: write
  contents: read

jobs:
  publish:
    name: Publish InnaPs to GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install PSResourceGet
        shell: pwsh
        run: |
          Install-Module -Name Microsoft.PowerShell.PSResourceGet -Force -AllowClobber -Scope CurrentUser

      - name: Update module manifest version
        shell: pwsh
        run: |
          $manifestPath = "./InnaPs/InnaPs.psd1"
          Update-ModuleManifest -Path $manifestPath -ModuleVersion "${{ steps.version.outputs.version }}"

      - name: Validate module
        shell: pwsh
        run: |
          $manifest = Test-ModuleManifest -Path "./InnaPs/InnaPs.psd1" -ErrorAction Stop
          Write-Host "Module Name   : $($manifest.Name)"
          Write-Host "Module Version: $($manifest.Version)"
          Write-Host "Functions     : $($manifest.ExportedFunctions.Keys -join ', ')"

      - name: Register GitHub Packages as PSResourceRepository
        shell: pwsh
        run: |
          Register-PSResourceRepository `
            -Name    "GitHubPackages" `
            -Uri     "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
            -Trusted `
            -Force

      - name: Publish module to GitHub Packages
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Publish-PSResource `
            -Path       "./InnaPs" `
            -Repository "GitHubPackages" `
            -ApiKey     $env:GITHUB_TOKEN `
            -Verbose
