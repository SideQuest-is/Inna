name: release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag name to build/release (e.g. v1.2.3). Required for manual runs."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.201"

      - name: Restore
        run: dotnet restore ./csp.csproj

      - name: Build (Release)
        run: dotnet build ./csp.csproj -c Release --no-restore

      - name: Test (Release)
        run: dotnet test ./csp.csproj -c Release --no-build

      - name: Determine release tag
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          else
            echo "Error: No tag provided. Push a tag (e.g. v1.2.3) or run workflow_dispatch with inputs.tag." >&2
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Publish (win-x64)
        run: dotnet publish ./csp.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true -o ./artifacts/sq-win-x64

      - name: Publish (linux-x64)
        run: dotnet publish ./csp.csproj -c Release -r linux-x64 --self-contained true /p:PublishSingleFile=true -o ./artifacts/sq-linux-x64

      - name: Publish (osx-x64)
        run: dotnet publish ./csp.csproj -c Release -r osx-x64 --self-contained true /p:PublishSingleFile=true -o ./artifacts/sq-osx-x64

      - name: Publish (osx-arm64)
        run: dotnet publish ./csp.csproj -c Release -r osx-arm64 --self-contained true /p:PublishSingleFile=true -o ./artifacts/sq-osx-arm64

      - name: Publish (linux-arm64)
        run: dotnet publish ./csp.csproj -c Release -r linux-arm64 --self-contained true /p:PublishSingleFile=true -o ./artifacts/sq-linux-arm64

      - name: Publish (linux-bionic-arm64)
        run: dotnet publish ./csp.csproj -c Release -r linux-bionic-arm64 --self-contained true /p:PublishSingleFile=true -o ./artifacts/sq-linux-bionic-arm64

      - name: Package artifacts
        shell: bash
        run: |
          cd artifacts
          for d in sq-win-x64 sq-linux-x64 sq-osx-x64 sq-osx-arm64 sq-linux-arm64 sq-linux-bionic-arm64; do
            zip -r "${d}.zip" "${d}" >/dev/null
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.name }}
          generate_release_notes: true
          files: |
            artifacts/sq-win-x64.zip
            artifacts/sq-linux-x64.zip
            artifacts/sq-osx-x64.zip
            artifacts/sq-osx-arm64.zip
            artifacts/sq-linux-arm64.zip
            artifacts/sq-linux-bionic-arm64.zip
